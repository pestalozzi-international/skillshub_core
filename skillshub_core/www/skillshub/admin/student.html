<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin - Student Detail - SkillsHub</title>
  <link rel="icon" id="sh-favicon" href="/assets/skillshub_core/images/favicon.png?v=1.1">
  <link rel="stylesheet" href="/skillshub/theme.css?v=1.1">
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    body { background-color: var(--color-slate-50); font-family: var(--font-family); }
    .admin-header { background: white; border-bottom: 1px solid var(--color-slate-200); padding: 1rem 2rem; position: sticky; top: 0; z-index: 100; }
    .ah-container { max-width: 1400px; margin: 0 auto; display: flex; justify-content: space-between; align-items: center; }
    .ah-title { font-size: 1.25rem; font-weight: 700; color: var(--color-slate-900); }
    
    .profile-banner { background: var(--header-gradient); padding: 3rem 2rem; color: white; }
    .pb-container { max-width: 1200px; margin: 0 auto; display: flex; justify-content: space-between; align-items: center; }
    .pb-info h1 { font-size: 2.5rem; margin: 0 0 0.5rem; font-weight: 700; }
    .pb-info p { opacity: 0.9; font-size: 1.1rem; margin: 0; }
    
    .main-container { max-width: 1200px; margin: -2rem auto 4rem; padding: 0 1.5rem; display: grid; grid-template-columns: 320px 1fr; gap: 2rem; }
    @media (max-width: 992px) { .main-container { grid-template-columns: 1fr; margin-top: 2rem; } }

    .section-title { font-size: 0.875rem; font-weight: 700; color: var(--color-teal-700); text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 1.25rem; display: flex; align-items: center; gap: 0.5rem; }
    .section-title::after { content: ''; flex: 1; height: 1px; background: var(--color-slate-100); }

    .data-row { margin-bottom: 1.25rem; }
    .data-label { font-size: 0.75rem; font-weight: 600; color: var(--color-slate-500); text-transform: uppercase; margin-bottom: 0.25rem; }
    .data-value { font-size: 1rem; color: var(--color-slate-900); font-weight: 500; }

    .timeline { border-left: 2px solid var(--color-slate-100); padding-left: 2rem; margin-left: 0.5rem; }
    .tl-item { position: relative; padding-bottom: 2.5rem; }
    .tl-item::before { content: ''; position: absolute; left: -2.4rem; top: 0.25rem; width: 0.75rem; height: 0.75rem; border-radius: 50%; background: white; border: 2px solid var(--color-teal-700); }
    .tl-item.completed::before { background: var(--color-teal-700); }
    .tl-date { font-size: 0.75rem; font-weight: 600; color: var(--color-slate-400); margin-bottom: 0.25rem; }
    .tl-title { font-size: 1.1rem; font-weight: 600; color: var(--color-slate-900); }
    .tl-meta { display: flex; gap: 0.75rem; margin-top: 0.5rem; }
  </style>
</head>
<body>
  <div class="admin-header">
    <div class="ah-container">
      <div class="ah-title">SkillsHub SIS</div>
      <div class="ah-actions">
        <a href="/skillshub/admin/students" style="color: var(--color-teal-700); font-weight: 600; text-decoration: none; font-size: 0.875rem;">&larr; Back to List</a>
        <button id="logout-btn" style="margin-left: 1.5rem; background: none; border: none; cursor: pointer; color: var(--color-slate-500); font-weight: 600; font-size: 0.875rem;">Sign Out</button>
      </div>
    </div>
  </div>

  <div id="content">
    <div style="text-align:center; padding:5rem; color:var(--color-slate-400);">Loading student profile...</div>
  </div>

  <script src="/assets/skillshub_core/js/skillshub/portal-settings.js?v=1.1"></script>
  <script src="/assets/skillshub_core/js/skillshub/student-detail.js?v=1.2"></script>
</body>
</html>
