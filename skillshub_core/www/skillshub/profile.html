<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SkillsHub Profile</title>
    <link rel="stylesheet" href="/skillshub/theme.css">
    <style>
        .profile-wrapper {
            max-width: 1200px;
            margin: 2rem auto;
            padding: 0 1rem;
        }
        .profile-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
            padding: 2rem;
            background: var(--color-teal-700);
            border-radius: var(--border-radius-card);
            color: white;
            box-shadow: var(--shadow-soft);
        }
        .profile-header h1 {
            color: white;
            margin: 0 0 0.5rem 0;
            font-size: 2rem;
        }
        .profile-header p {
            margin: 0;
            color: var(--color-emerald-50);
            font-size: 1.1rem;
        }
        .logout-btn {
            background-color: rgba(255, 255, 255, 0.2);
            color: white;
            border: 1px solid rgba(255, 255, 255, 0.3);
        }
        .logout-btn:hover {
            background-color: rgba(255, 255, 255, 0.3);
        }
        
        .profile-grid {
            display: grid;
            grid-template-columns: 320px 1fr;
            gap: 2rem;
        }
        @media (max-width: 768px) {
            .profile-grid { grid-template-columns: 1fr; }
        }

        .sidebar h3, .main-content h3 {
            margin-top: 0;
            border-bottom: 1px solid var(--color-slate-200);
            padding-bottom: 1rem;
            margin-bottom: 1.5rem;
            color: var(--color-slate-900);
        }

        .detail-item { margin-bottom: 1.25rem; }
        .detail-item:last-child { margin-bottom: 0; }
        .detail-label { 
            font-size: 0.75rem; 
            color: var(--color-slate-500); 
            font-weight: 600; 
            text-transform: uppercase; 
            letter-spacing: 0.05em; 
            margin-bottom: 0.25rem;
        }
        .detail-value { font-size: 1rem; color: var(--color-slate-900); font-weight: 500; }

        .timeline-item {
            padding: 1.5rem 0;
            border-bottom: 1px solid var(--color-slate-100);
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
        }
        .timeline-item:last-child { border-bottom: none; padding-bottom: 0; }
        .timeline-name { font-weight: 600; font-size: 1.125rem; color: var(--color-slate-900); margin-bottom: 0.5rem; }
        .timeline-meta { font-size: 0.875rem; color: var(--color-slate-500); }
        
        .loading-state { text-align: center; padding: 4rem; color: var(--color-slate-500); font-size: 1.125rem; }
        .error-state { display: none; margin-top: 2rem; }
    </style>
</head>
<body>

<div class="profile-wrapper" id="sh-profile-app">
    <div class="loading-state" id="sh-loading">Loading your profile...</div>
    <div class="sh-alert-error error-state" id="sh-error">Failed to load profile. Please try again.</div>
    
    <div id="sh-profile-content" style="display: none;">
        <div class="profile-header">
            <div>
                <h1 id="ph-name">Student Name</h1>
                <p id="ph-cohort-path">Cohort • Path</p>
            </div>
            <button class="sh-btn-secondary logout-btn" id="sh-logout">Sign Out</button>
        </div>

        <div class="profile-grid">
            <div class="sh-card sidebar">
                <h3>Demographics & Contact</h3>
                <div class="detail-item">
                    <div class="detail-label">Student ID</div>
                    <div class="detail-value" id="ps-id">--</div>
                </div>
                <div class="detail-item">
                    <div class="detail-label">Age</div>
                    <div class="detail-value" id="ps-age">--</div>
                </div>
                <div class="detail-item">
                    <div class="detail-label">Gender</div>
                    <div class="detail-value" id="ps-gender">--</div>
                </div>
                <div class="detail-item">
                    <div class="detail-label">Location</div>
                    <div class="detail-value" id="ps-location">--</div>
                </div>
                <div class="detail-item">
                    <div class="detail-label">Status</div>
                    <div class="detail-value" id="ps-status">--</div>
                </div>
            </div>

            <div class="sh-card main-content">
                <h3>Programme Timeline</h3>
                <div id="sh-timeline-container">
                    <!-- Dynamic enrolments will be rendered here -->
                </div>
            </div>
        </div>
    </div>
</div>

<script src="/skillshub/profile.js" type="module"></script>
</body>
</html>
