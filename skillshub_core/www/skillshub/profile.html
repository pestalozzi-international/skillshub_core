<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Profile - SkillsHub</title>
  <link rel="icon" id="sh-favicon" href="/assets/skillshub_core/images/favicon.png?v=1.1">
  <link rel="stylesheet" href="/skillshub/theme.css?v=1.1">
  <style>
    body{background-color:var(--color-slate-50)}
    .profile-header{background:var(--header-gradient);padding:2rem 2.5rem}
    .ph-content{max-width:1200px;margin:0 auto;display:flex;justify-content:space-between;align-items:flex-start;gap:2rem}
    .ph-title h1{color:white;margin:0 0 .5rem;font-size:2rem}
    .ph-title p{color:rgba(255,255,255,.8);margin:0}
    .ph-nav{display:flex;gap:.75rem;align-items:center;flex-wrap:wrap}
    .ph-nav a{background:rgba(255,255,255,.15);color:white;border:1px solid rgba(255,255,255,.3);border-radius:var(--border-radius-btn);padding:.5rem 1rem;text-decoration:none;font-size:.875rem;font-weight:500}
    .ph-nav a:hover{background:rgba(255,255,255,.25)}
    #logout-btn{background:rgba(255,255,255,.15);color:white;border:1px solid rgba(255,255,255,.3);border-radius:var(--border-radius-btn);padding:.5rem 1rem;font-size:.875rem;font-weight:500;cursor:pointer}
    .profile-grid{max-width:1200px;margin:2rem auto;padding:0 1.5rem 2rem;display:grid;grid-template-columns:340px 1fr;gap:2rem}
    @media(max-width:768px){.profile-grid{grid-template-columns:1fr}.ph-content{flex-direction:column}}
    .sidebar{display:flex;flex-direction:column;gap:1.5rem}
    .detail-label{font-size:.75rem;font-weight:600;text-transform:uppercase;color:var(--color-slate-500);letter-spacing:.05em;margin-bottom:.25rem}
    .detail-value{font-size:.9375rem;color:var(--color-slate-900);font-weight:500}
    .detail-item{margin-bottom:1.1rem}
    .edit-contact-form{display:none;margin-top:1rem;padding-top:1rem;border-top:1px solid var(--color-slate-200)}
    .edit-contact-form.show{display:block}
    .form-group{margin-bottom:1rem}
    .form-group label{display:block;font-size:.75rem;font-weight:600;text-transform:uppercase;color:var(--color-slate-600);letter-spacing:.05em;margin-bottom:.4rem}
    .form-group input{width:100%;padding:.5rem .75rem;border:1px solid var(--color-slate-200);border-radius:.5rem;font-size:.875rem;color:var(--color-slate-900);box-sizing:border-box}
    .form-group input:focus{outline:none;border-color:var(--color-teal-700)}
    .form-actions{display:flex;gap:.75rem;margin-top:.75rem}
    .btn-small-primary{background:var(--color-teal-700);color:white;border:none;border-radius:var(--border-radius-btn);padding:.5rem 1rem;font-size:.8125rem;font-weight:600;cursor:pointer}
    .btn-small-secondary{background:var(--color-slate-100);color:var(--color-slate-700);border:none;border-radius:var(--border-radius-btn);padding:.5rem 1rem;font-size:.8125rem;font-weight:600;cursor:pointer}
    .contact-message{display:none;margin-top:.75rem;padding:.625rem .875rem;border-radius:.5rem;font-size:.8125rem;font-weight:500}
    .contact-message.success{background:var(--color-emerald-50);color:var(--color-emerald-700);border:1px solid var(--color-emerald-200)}
    .contact-message.error{background:var(--color-red-50);color:var(--color-red-700);border:1px solid var(--color-red-200)}
    .timeline{position:relative;padding-left:1.75rem}
    .timeline::before{content:'';position:absolute;left:0;top:0;bottom:0;width:2px;background:var(--color-slate-200)}
    .timeline-item{position:relative;margin-bottom:1.75rem}
    .timeline-item::before{content:'';position:absolute;left:-1.875rem;top:.25rem;width:.75rem;height:.75rem;border-radius:50%;background:var(--color-teal-700);border:2px solid white;box-shadow:0 0 0 2px var(--color-teal-700)}
    .timeline-date{font-size:.75rem;color:var(--color-slate-500);margin-bottom:.25rem}
    .timeline-title{font-weight:600;color:var(--color-slate-900);margin-bottom:.25rem}
    .timeline-description{font-size:.875rem;color:var(--color-slate-600)}
  </style>
  <script>
    window.frappe = {};
    frappe.csrf_token = "{{ frappe.session.csrf_token }}";
  </script>
</head>
<body>
  <div class="profile-header">
    <div class="ph-content">
      <div class="ph-title"><h1 id="ph-name">Loading...</h1><p id="ph-cohort-path">-</p></div>
      <div class="ph-nav">
        <a href="/skillshub/feedback/mindset-camp">Mindset Camp</a>
        <a href="/skillshub/feedback/soft-skills">Soft Skills</a>
        <a href="/skillshub/feedback/vocational-training">VT Feedback</a>
        <a href="/skillshub/baseline">Baseline</a>
        <button id="logout-btn">Sign Out</button>
      </div>
    </div>
  </div>
  <div class="profile-grid">
    <div class="sidebar">
      <div class="sh-card">
        <h3 style="margin-top:0;border-bottom:1px solid var(--color-slate-200);padding-bottom:.75rem;margin-bottom:1rem;font-size:.9375rem">Personal Details</h3>
        <div class="detail-item"><div class="detail-label">Student ID</div><div class="detail-value" id="ps-student-id">-</div></div>
        <div class="detail-item"><div class="detail-label">Date of Birth</div><div class="detail-value" id="ps-dob">-</div></div>
        <div class="detail-item"><div class="detail-label">Gender</div><div class="detail-value" id="ps-gender">-</div></div>
        <div class="detail-item"><div class="detail-label">Status</div><div class="detail-value" id="ps-location">-</div></div>
      </div>
      <div class="sh-card">
        <h3 style="margin-top:0;border-bottom:1px solid var(--color-slate-200);padding-bottom:.75rem;margin-bottom:1rem;font-size:.9375rem">Address &amp; Contact</h3>
        <div class="detail-item"><div class="detail-label">Address Line 1</div><div class="detail-value" id="ps-address-1">-</div></div>
        <div class="detail-item"><div class="detail-label">Address Line 2</div><div class="detail-value" id="ps-address-2">-</div></div>
        <div class="detail-item"><div class="detail-label">Postcode</div><div class="detail-value" id="ps-pincode">-</div></div>
        <button id="edit-contact-btn" class="btn-small-primary" style="margin-top:.75rem;width:100%">Edit Address</button>
        <form id="contact-form" class="edit-contact-form">
          <div class="form-group"><label>Address Line 1</label><input type="text" id="contact-address-1"></div>
          <div class="form-group"><label>Address Line 2</label><input type="text" id="contact-address-2"></div>
          <div class="form-group"><label>Postcode</label><input type="text" id="contact-pincode"></div>
          <div class="form-actions">
            <button type="submit" class="btn-small-primary">Save</button>
            <button type="button" id="cancel-contact-btn" class="btn-small-secondary">Cancel</button>
          </div>
        </form>
        <div id="contact-message" class="contact-message"></div>
      </div>
    </div>
    <div class="sh-card main-content">
      <h3 style="margin-top:0;border-bottom:1px solid var(--color-slate-200);padding-bottom:.75rem;margin-bottom:1.5rem">Programme Timeline</h3>
      <div id="timeline-container" class="timeline"></div>
    </div>
  </div>
  <script src="/assets/skillshub_core/js/skillshub/portal-settings.js?v=1.1"></script>
  <script src="/assets/skillshub_core/js/skillshub/profile.js?v=1.1"></script>
</body>
</html>
