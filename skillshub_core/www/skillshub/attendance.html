<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SkillsHub Attendance</title>
    <link rel="stylesheet" href="/skillshub/theme.css">
    <style>
        .att-wrapper {
            max-width: 900px;
            margin: 2rem auto;
            padding: 0 1rem;
        }
        .att-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
        }
        .att-header h1 {
            margin: 0;
            color: var(--color-slate-900);
            font-size: 2rem;
        }
        .offline-badge {
            display: none;
            background: var(--color-amber-50);
            color: var(--color-amber-700);
            border: 1px solid var(--color-amber-200);
            padding: 0.5rem 1rem;
            border-radius: 9999px;
            font-size: 0.875rem;
            font-weight: 600;
            margin-right: 1rem;
        }
        .sync-btn {
            background-color: var(--color-emerald-700);
            display: none;
        }
        .sync-btn:hover { background-color: var(--color-emerald-800); }

        .form-group { margin-bottom: 1.5rem; }
        .form-group:last-child { margin-bottom: 0; }

        .student-list { margin-top: 1.5rem; }
        .student-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1rem 0;
            border-bottom: 1px solid var(--color-slate-100);
        }
        .student-row:last-child { border-bottom: none; }
        .student-info { font-weight: 600; color: var(--color-slate-900); }
        .student-id { font-size: 0.875rem; color: var(--color-slate-500); margin-top: 0.25rem; }

        .toggle-group { display: flex; gap: 0.5rem; }
        .toggle-btn {
            padding: 0.5rem 1rem;
            border: 1px solid var(--color-slate-200);
            background: #fff;
            color: var(--color-slate-600);
            border-radius: 0.5rem;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.2s;
            font-size: 0.875rem;
        }
        .toggle-btn.present { background: var(--color-emerald-50); color: var(--color-emerald-700); border-color: var(--color-emerald-200); }
        .toggle-btn.absent { background: var(--color-red-50); color: var(--color-red-700); border-color: var(--color-red-200); }

        .submit-btn { width: 100%; margin-top: 1.5rem; }
        #sh-attendance-area { display: none; margin-top: 2rem; }
    </style>
</head>
<body>

<div class="att-wrapper">
    <div class="att-header">
        <h1>Mark Attendance</h1>
        <div style="display: flex; align-items: center;">
            <span class="offline-badge" id="offline-badge">Offline: Saved Locally</span>
            <button class="sh-btn-primary sync-btn" id="sync-btn">Sync Now (0)</button>
            <button class="sh-btn-secondary" id="sh-logout" style="margin-left: 1rem;">Sign Out</button>
        </div>
    </div>

    <div class="sh-card" style="margin-bottom: 2rem;">
        <div class="form-group">
            <label for="schedule-select" class="sh-label">Programme Schedule</label>
            <select id="schedule-select" class="sh-input">
                <option value="">Select a schedule...</option>
            </select>
        </div>
        <div class="form-group">
            <label for="attendance-date" class="sh-label">Date</label>
            <input type="date" id="attendance-date" class="sh-input">
        </div>
    </div>

    <div class="sh-card" id="sh-attendance-area">
        <h3 style="margin-top: 0;">Enrolled Students</h3>
        <div class="student-list" id="student-list">
            <!-- Dynamic student rows here -->
        </div>
        <button class="sh-btn-primary submit-btn" id="submit-att-btn">Submit Attendance</button>
    </div>
</div>

<script src="/skillshub/attendance.js" type="module"></script>
</body>
</html>
