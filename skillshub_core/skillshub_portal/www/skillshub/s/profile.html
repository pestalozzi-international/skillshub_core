<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Profile — SkillsHub</title>
  <link rel="stylesheet" href="/skillshub/theme.css?v=4.0">
  <link rel="stylesheet" href="/skillshub/pi-theme.css?v=4.0">
  <script>window.frappe = {}; frappe.csrf_token = "{{ frappe.session.csrf_token }}";</script>
</head>
<body data-gate-title="My Profile">

<header class="pi-header">
  <div class="pi-wrap pi-header-inner">
    <div class="pi-logo-mark">PI</div>
    <div>
      <div class="pi-header-title">SkillsHub Portal</div>
      <div class="pi-header-sub">Pestalozzi International</div>
    </div>
    <nav class="pi-header-nav">
      <a href="/skillshub/s/">Home</a>
      <a href="/skillshub/s/forms">My Forms</a>
    </nav>
  </div>
</header>

<div class="pi-hero" style="padding-bottom:2.5rem;">
  <div class="pi-wrap">
    <div style="display:flex;align-items:center;gap:1rem;">
      <div class="pi-student-avatar" style="width:4rem;height:4rem;font-size:1.4rem;background:rgba(255,255,255,0.2);border:2px solid rgba(255,255,255,0.4);" id="pi-avatar">PI</div>
      <div>
        <h1 style="font-size:1.6rem;margin:0 0 0.2rem;" id="pi-student-name">Loading…</h1>
        <p style="margin:0;opacity:0.8;font-family:monospace;font-size:0.9rem;" id="pi-student-id"></p>
      </div>
    </div>
  </div>
</div>

<main class="pi-wrap" style="padding-top:1.5rem;padding-bottom:5rem;">
  <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:1.5rem;flex-wrap:wrap;gap:0.75rem;">
    <div>
      <h2 style="margin:0;font-size:1.15rem;">My Profile</h2>
      <p class="pi-text-xs pi-text-muted" style="margin:0.25rem 0 0;">Update your information below and save when done.</p>
    </div>
    <a href="/skillshub/s/forms" class="pi-btn pi-btn-sky pi-btn-sm" style="text-decoration:none;">📋 My Forms →</a>
  </div>

  <div id="pi-profile-body">
    <div class="pi-skeleton" style="height:12rem;border-radius:1rem;margin-bottom:1.25rem;"></div>
    <div class="pi-skeleton" style="height:10rem;border-radius:1rem;margin-bottom:1.25rem;"></div>
    <div class="pi-skeleton" style="height:8rem;border-radius:1rem;"></div>
  </div>
</main>

<!-- Sticky save bar -->
<div id="pi-save-bar" class="pi-save-bar" style="display:none;">
  <div class="pi-wrap" style="display:flex;align-items:center;justify-content:space-between;width:100%;gap:1rem;flex-wrap:wrap;">
    <span class="pi-text-sm pi-text-muted">You have unsaved changes.</span>
    <div style="display:flex;gap:0.75rem;align-items:center;">
      <span id="pi-save-msg"></span>
      <button id="pi-save-btn" class="pi-btn pi-btn-primary">Save Profile</button>
    </div>
  </div>
</div>

<script src="/assets/skillshub_core/js/skillshub/s-gate.js?v=4.0"></script>
<script src="/assets/skillshub_core/js/skillshub/s-profile.js?v=4.0"></script>
</body>
</html>
