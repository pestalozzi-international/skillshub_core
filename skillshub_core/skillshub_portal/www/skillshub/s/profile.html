<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Profile — SkillsHub</title>
  <link rel="icon" href="/assets/skillshub_core/images/favicon.png">
  <link rel="stylesheet" href="/skillshub/theme.css?v=4.3">
  <link rel="stylesheet" href="/skillshub/pi-theme.css?v=4.3">
  <script>window.frappe = {}; frappe.csrf_token = "{{ frappe.session.csrf_token }}";</script>
</head>
<body data-gate-title="My Profile">

<header class="pi-header">
  <div class="pi-wrap pi-header-inner">
    <div class="pi-logo-mark">PI</div>
    <div>
      <div class="pi-header-title">SkillsHub Portal</div>
      <div class="pi-header-sub">Pestalozzi International</div>
    </div>
    <nav class="pi-header-nav">
      <a href="#" onclick="event.preventDefault();if(window.SHGate)window.SHGate.clearSession();location.reload()">Sign Out</a>
    </nav>
  </div>
</header>

<div class="pi-hero" style="padding-bottom:2.5rem;">
  <div class="pi-wrap" style="display:flex;align-items:center;gap:0.75rem;">
    <span style="font-size:2rem;">👤</span>
    <div>
      <h1 id="pi-profile-heading" style="font-size:1.6rem;margin:0 0 0.2rem;">My Profile</h1>
      <p style="margin:0;opacity:0.8;font-size:0.9rem;">Review and update your personal details.</p>
    </div>
  </div>
</div>

<div class="pi-wrap pi-wrap-narrow" style="padding-top:1.5rem;padding-bottom:6rem;">
  <div style="margin-bottom:0.75rem;">
    <a href="/skillshub/s/" class="pi-btn pi-btn-secondary" style="text-decoration:none;font-size:0.85rem;">← My Forms</a>
  </div>

  <div id="pi-profile-loading">
    <div class="pi-skeleton" style="height:3rem;border-radius:0.75rem;margin-bottom:1rem;"></div>
    <div class="pi-skeleton" style="height:3rem;border-radius:0.75rem;margin-bottom:1rem;"></div>
    <div class="pi-skeleton" style="height:3rem;border-radius:0.75rem;"></div>
  </div>

  <div id="pi-profile-body" style="display:none;"></div>
  <div id="pi-profile-msg" style="margin-top:1rem;"></div>

  <div id="pi-profile-actions" style="display:none;margin-top:1.5rem;display:none;gap:0.75rem;justify-content:flex-end;">
    <button id="pi-profile-save" class="pi-btn pi-btn-primary">Save Profile</button>
  </div>
</div>

<script src="/assets/skillshub_core/js/skillshub/s-gate.js?v=4.3"></script>
<script src="/assets/skillshub_core/js/skillshub/s-profile.js?v=4.3"></script>
</body>
</html>
