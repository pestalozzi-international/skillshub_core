<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Baseline Assessment — SkillsHub</title>
  <link rel="icon" href="/assets/skillshub_core/images/favicon.png">
  <link rel="stylesheet" href="/skillshub/theme.css?v=4.2">
  <link rel="stylesheet" href="/skillshub/pi-theme.css?v=4.2">
  <script>window.frappe = {}; frappe.csrf_token = "{{ frappe.session.csrf_token }}";</script>
</head>
<body data-doctype="SH Baseline" data-title="Baseline Assessment" data-gate-title="Baseline Assessment">

<header class="pi-header">
  <div class="pi-wrap pi-header-inner">
    <div class="pi-logo-mark">PI</div>
    <div>
      <div class="pi-header-title">SkillsHub Portal</div>
      <div class="pi-header-sub">Pestalozzi International</div>
    </div>
    <nav class="pi-header-nav">
      <a href="#" onclick="event.preventDefault();if(window.SHGate)window.SHGate.clearSession();location.reload()">Sign Out</a>
    </nav>
  </div>
</header>

<div class="pi-hero" style="padding-bottom:2.5rem;">
  <div class="pi-wrap" style="display:flex;align-items:center;gap:0.75rem;">
    <span style="font-size:2rem;">📋</span>
    <div>
      <h1 style="font-size:1.6rem;margin:0 0 0.2rem;">Baseline Assessment</h1>
      <p style="margin:0;opacity:0.8;font-size:0.9rem;">Fill in all sections and submit when complete.</p>
    </div>
  </div>
</div>

<div id="pi-form-wrap" class="pi-wrap pi-wrap-narrow" style="padding-top:1.5rem;padding-bottom:4rem;">
  <div style="margin-bottom:0.75rem;">
    <a href="/skillshub/s/" class="pi-btn pi-btn-secondary" style="text-decoration:none;font-size:0.85rem;">← All Forms</a>
  </div>
  <div class="pi-card">
    <div id="pi-form-body">
      <div class="pi-skeleton" style="height:3rem;border-radius:0.75rem;margin-bottom:1rem;"></div>
      <div class="pi-skeleton" style="height:3rem;border-radius:0.75rem;margin-bottom:1rem;"></div>
      <div class="pi-skeleton" style="height:3rem;border-radius:0.75rem;"></div>
    </div>
    <div id="pi-form-msg" style="margin-top:1rem;"></div>
    <div style="margin-top:1.5rem;display:flex;gap:0.75rem;flex-wrap:wrap;justify-content:space-between;align-items:center;">
      <button id="pi-nav-prev" class="pi-btn pi-btn-secondary" style="display:none;">← Previous</button>
      <span id="pi-section-counter" style="font-size:0.8rem;color:var(--pi-muted);display:none;"></span>
      <div style="display:flex;gap:0.75rem;">
        <button id="pi-nav-next" class="pi-btn pi-btn-secondary" style="display:none;">Next →</button>
        <button id="pi-form-submit" class="pi-btn pi-btn-primary">Submit Form</button>
      </div>
    </div>
  </div>
</div>

<script src="/assets/skillshub_core/js/skillshub/s-gate.js?v=4.2"></script>
<script src="/assets/skillshub_core/js/skillshub/s-form-fill.js?v=4.2"></script>
</body>
</html>
