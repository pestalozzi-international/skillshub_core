<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SkillsHub Portal</title>
  <link rel="icon" id="sh-favicon" href="/assets/skillshub_core/images/favicon.png">
  <link rel="stylesheet" href="/skillshub/theme.css?v=4.0">
  <link rel="stylesheet" href="/skillshub/pi-theme.css?v=4.0">
  <style>
    .landing-wrap { min-height: 100vh; display: grid; place-items: center; padding: 2rem; background: var(--pi-red); }
    .landing-card { width: min(480px, 100%); background: rgba(255,255,255,0.96); border: 1px solid rgba(255,255,255,0.36); border-radius: 1rem; box-shadow: 0 8px 32px rgba(0,0,0,0.18); padding: 2rem; }
    .landing-btn { display: flex; flex-direction: column; gap: 0.3rem; text-decoration: none; border: 1px solid var(--pi-red); border-radius: 0.85rem; padding: 1rem 1.25rem; color: #fff; background: var(--pi-red); margin-top: 1.25rem; font-weight: 600; font-size: 1rem; text-align: center; }
    .landing-btn:hover { background: var(--pi-red-dark); }
    .landing-btn span { font-size: 0.82rem; font-weight: 400; opacity: 0.85; margin-top: 0.15rem; }
  </style>
  <script>
    window.frappe = {};
    frappe.csrf_token = "{{ frappe.session.csrf_token }}";
  </script>
</head>
<body>
  <main class="landing-wrap">
    <section class="landing-card">
      <div style="display:flex;align-items:center;gap:0.75rem;margin-bottom:1.25rem;">
        <img class="sh-logo" style="display:none;max-height:44px;" alt="SkillsHub">
        <div>
          <h1 style="margin:0;font-size:1.6rem;" data-portal-name>SkillsHub Portal</h1>
          <p style="margin:0.2rem 0 0;font-size:0.85rem;color:var(--pi-muted);" data-portal-tagline>Pestalozzi International</p>
        </div>
      </div>
      <p style="margin:0 0 0.5rem;font-size:0.9rem;color:var(--pi-muted);">Staff &amp; administrator access.</p>
      <a class="landing-btn" href="/skillshub/login">
        Staff Login
        <span>Manage students, attendance and programme data</span>
      </a>
    </section>
  </main>
  <script src="/assets/skillshub_core/js/skillshub/portal-settings.js?v=4.0"></script>
  <script>
    window.addEventListener('sh-portal-ready', function (event) {
      var settings = event.detail && event.detail.settings ? event.detail.settings : {};
      var bootstrap = event.detail && event.detail.bootstrap ? event.detail.bootstrap : {};
      if (bootstrap && bootstrap.is_logged_in && bootstrap.is_admin) {
        var target = settings.admin_home_route || '/skillshub/admin/students';
        window.location.replace(target);
      }
    });
  </script>
</body>
</html>
