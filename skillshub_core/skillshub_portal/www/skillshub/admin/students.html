<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SkillsHub Admin - Students</title>
  <link rel="icon" id="sh-favicon" href="/assets/skillshub_core/images/favicon.png">
  <link rel="stylesheet" href="/skillshub/theme.css?v=4.2">
  <link rel="stylesheet" href="/skillshub/admin/theme.css?v=4.2">
  <link rel="stylesheet" href="/skillshub/pi-theme.css?v=4.2">
  <script>
    window.frappe = {};
    frappe.csrf_token = "{{ frappe.session.csrf_token }}";
  </script>
</head>
<body>
  <div class="sh-page-header">
    <div class="sh-container">
      <div class="sh-admin-header-row">
        <div>
          <h1>Student Directory</h1>
          <p data-portal-tagline>Manage students without leaving the portal.</p>
        </div>
        <div class="sh-admin-nav">
          <a href="/skillshub/admin/students" class="active">Students</a>
          <a href="/skillshub/admin/student-cards">Cards</a>
          <a href="/skillshub/admin/attendance">Attendance</a>
          <a href="/skillshub/admin/programme-overview">Programme</a>
          <a href="/skillshub/admin/settings">Settings</a>
          <a href="/app" target="_blank">Desk ↗</a>
          <span id="sh-admin-user-wrap" style="display:none;font-size:0.78rem;opacity:0.75;padding:0.25rem 0.5rem;background:rgba(255,255,255,0.15);border-radius:0.4rem;" title="Logged in as"><span id="sh-admin-user-name"></span></span>
          <a href="/api/method/skillshub_core.skillshub_portal.api.portal_logout?redirect_to=%2Fskillshub" data-sh-logout="1">Logout</a>
        </div>
      </div>
    </div>
  </div>

  <main class="sh-container" style="margin-top:-1.8rem;padding-bottom:2rem;">
    <section class="sh-card">
      <div class="sh-form-grid">
        <div>
          <label class="sh-label">Search</label>
          <input id="f-search" class="sh-input" placeholder="Name, student ID, email">
        </div>
        <div>
          <label class="sh-label">Status</label>
          <select id="f-status" class="sh-input">
            <option value="">All</option>
            <option value="Student">Student</option>
            <option value="Alumni">Alumni</option>
            <option value="Dropped">Dropped</option>
          </select>
        </div>
        <div>
          <label class="sh-label">Programme Path</label>
          <select id="f-programme-path" class="sh-input">
            <option value="">All</option>
            <option value="Path A">Path A</option>
            <option value="Path B">Path B</option>
          </select>
        </div>
        <div>
          <label class="sh-label">Cohort</label>
          <select id="f-intake-cohort" class="sh-input">
            <option value="">All</option>
          </select>
        </div>
        <div>
          <label class="sh-label">Items per page</label>
          <select id="f-page-size" class="sh-input">
            <option value="10">10</option>
            <option value="25" selected>25</option>
            <option value="50">50</option>
            <option value="100">100</option>
          </select>
        </div>
      </div>
      <div style="margin-top:1rem;display:flex;gap:0.5rem;">
        <button id="btn-apply" class="sh-btn-primary">Apply Filters</button>
        <button id="btn-reset" class="sh-btn-secondary">Reset</button>
      </div>
    </section>

    <section class="sh-card" style="margin-top:1rem;">
      <div id="students-meta" style="font-size:0.82rem;color:var(--pi-muted);margin-bottom:0.6rem;min-height:1.2rem;"></div>
      <div class="table-wrap" style="overflow-x:auto;">
        <table class="sh-admin-table" id="students-table" style="min-width:700px;">
          <thead>
            <tr>
              <th style="min-width:180px;">Student <span style="font-weight:400;opacity:0.6;font-size:0.68rem;">● = portal login</span></th>
              <th>Status</th>
              <th>Path</th>
              <th>Cohort</th>
              <th>Current</th>
              <th style="text-align:center;">Enrolments</th>
              <th style="text-align:center;">Attendance</th>
              <th></th>
            </tr>
          </thead>
          <tbody id="students-body">
            <tr><td colspan="8" class="sh-empty-cell" style="padding:2rem;text-align:center;">Loading students…</td></tr>
          </tbody>
        </table>
      </div>
      <div style="display:flex;justify-content:space-between;align-items:center;gap:1rem;margin-top:1rem;flex-wrap:wrap;">
        <div id="pagination-info" style="font-size:0.82rem;color:var(--muted-text-color);"></div>
        <div style="display:flex;gap:0.45rem;align-items:center;">
          <button id="page-prev" class="sh-btn-secondary">Previous</button>
          <span id="page-label" style="font-size:0.82rem;color:var(--muted-text-color);">Page 1</span>
          <button id="page-next" class="sh-btn-secondary">Next</button>
        </div>
      </div>
    </section>
  </main>

  <script src="/assets/skillshub_core/js/skillshub/portal-settings.js?v=4.2"></script>
  <script src="/assets/skillshub_core/js/skillshub/students-admin.js?v=4.2"></script>
</body>
</html>
