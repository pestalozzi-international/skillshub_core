<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My SkillsHub Profile</title>
  <link rel="icon" id="sh-favicon" href="/assets/skillshub_core/images/favicon.png">
  <link rel="stylesheet" href="/skillshub/theme.css?v=3.0">
  <style>
    .profile-grid { display:grid; grid-template-columns: 340px 1fr; gap:1rem; margin-top:-1.8rem; }
    .profile-block { margin-bottom:1rem; }
    .feedback-grid { display:grid; grid-template-columns:repeat(2,minmax(0,1fr)); gap:0.65rem; }
    .feedback-link { text-decoration:none; border:1px solid var(--color-slate-200); border-radius:0.75rem; padding:0.72rem; color:var(--text-color); background:#fff; }
    .feedback-link:hover { border-color:var(--color-accent-500); }
    @media (max-width:960px) { .profile-grid { grid-template-columns:1fr; margin-top:1rem; } .feedback-grid { grid-template-columns:1fr; } }
  </style>
  <script>
    window.frappe = {};
    frappe.csrf_token = "{{ frappe.session.csrf_token }}";
  </script>
</head>
<body>
  <div class="sh-page-header">
    <div class="sh-container">
      <div style="display:flex;justify-content:space-between;align-items:center;gap:1rem;flex-wrap:wrap;">
        <div>
          <h1 id="profile-title">My Profile</h1>
          <p id="profile-subtitle" data-portal-tagline>Everything you need, in one place.</p>
        </div>
        <div style="display:flex;gap:1rem;align-items:center;">
          <a href="/api/method/skillshub_core.skillshub_portal.api.portal_logout?redirect_to=%2Fskillshub" data-sh-logout="1" style="color:white;text-decoration:none;opacity:0.9;">Logout</a>
        </div>
      </div>
    </div>
  </div>

  <main class="sh-container" style="padding-bottom:2rem;">
    <div class="profile-grid">
      <aside>
        <section class="sh-card profile-block" id="student-card">
          <div style="color:var(--muted-text-color);">Loading profile...</div>
        </section>
        <section class="sh-card profile-block">
          <h3 style="margin-top:0;">Submitted Forms</h3>
          <div id="submitted-forms-list" style="display:grid;gap:0.45rem;"></div>
        </section>
      </aside>

      <section>
        <section class="sh-card profile-block">
          <div style="display:flex;justify-content:space-between;align-items:center;gap:0.6rem;flex-wrap:wrap;">
            <h3 style="margin:0;">My Details</h3>
            <button id="btn-edit-profile" type="button" class="sh-btn-secondary">Edit Profile</button>
          </div>
          <form id="student-edit-form" style="display:none;margin-top:0.8rem;">
            <div style="display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:0.75rem;">
              <div>
                <label class="sh-label" for="edit-mobile">Mobile</label>
                <input id="edit-mobile" class="sh-input" type="text" />
              </div>
              <div>
                <label class="sh-label" for="edit-pincode">Pincode</label>
                <input id="edit-pincode" class="sh-input" type="text" />
              </div>
              <div>
                <label class="sh-label" for="edit-address-line-1">Address Line 1</label>
                <input id="edit-address-line-1" class="sh-input" type="text" />
              </div>
              <div>
                <label class="sh-label" for="edit-address-line-2">Address Line 2</label>
                <input id="edit-address-line-2" class="sh-input" type="text" />
              </div>
              <div style="grid-column:1 / -1;">
                <label class="sh-label">Motivations</label>
                <div id="edit-motivations-options" style="display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:0.45rem;"></div>
              </div>
              <div style="grid-column:1 / -1;">
                <label class="sh-label">Resilience Statements</label>
                <div id="edit-resilience-options" style="display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:0.45rem;"></div>
              </div>
            </div>
            <div style="display:flex;gap:0.5rem;justify-content:flex-end;margin-top:0.8rem;">
              <button id="btn-cancel-profile-edit" type="button" class="sh-btn-secondary">Cancel</button>
              <button id="btn-save-profile-edit" type="submit" class="sh-btn-primary">Save Changes</button>
            </div>
          </form>
          <div id="student-edit-status" style="margin-top:0.7rem;font-size:0.82rem;color:var(--muted-text-color);"></div>
        </section>
        <section class="sh-card profile-block">
          <h3 style="margin-top:0;">Enrolments & Progress</h3>
          <div id="enrolments-list"></div>
        </section>
        <section class="sh-card profile-block">
          <h3 style="margin-top:0;">Submit New Form</h3>
          <div class="feedback-grid" id="feedback-links"></div>
        </section>
      </section>
    </div>
  </main>
  <script src="/assets/skillshub_core/js/skillshub/portal-settings.js?v=3.0"></script>
  <script src="/assets/skillshub_core/js/skillshub/profile.js?v=3.2"></script>
</body>
</html>
