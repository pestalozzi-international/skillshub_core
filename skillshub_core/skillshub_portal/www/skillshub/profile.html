<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Profile - SkillsHub</title>
  <link rel="icon" id="sh-favicon" href="/assets/skillshub_core/images/favicon.png?v=2.5">
  <link rel="stylesheet" href="/skillshub/theme.css?v=2.5">
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    body { background-color: var(--color-slate-50); font-family: var(--font-family); }
  </style>
  <script>
    window.frappe = {};
    frappe.csrf_token = "{{ frappe.session.csrf_token }}";
  </script>
</head>
<body>
  <div class="sh-page-header">
    <div class="sh-container">
      <div style="display:flex; justify-content:space-between; align-items:center;">
        <div>
          <h1>My Profile</h1>
          <p>Skillshub Student Portal</p>
        </div>
        <div class="sh-admin-nav" style="display:flex; gap:1.5rem; align-items:center;">
          <a href="/skillshub/profile" class="active" style="color:white; text-decoration:none; font-weight:600; border-bottom:2px solid white; padding-bottom:2px;">Profile</a>
          <button id="logout-btn" style="background:none; border:none; color:white; opacity:0.8; font-weight:600; cursor:pointer; font-size:0.875rem; margin-left:0.5rem;">Sign Out</button>
        </div>
      </div>
    </div>
  </div>

  <div class="sh-container">
    <div id="content" style="margin-top:-2rem;">
      <div style="text-align:center; padding:5rem; color:var(--color-slate-400);">Loading student profile...</div>
    </div>
  </div>

  <script src="/assets/skillshub_core/js/skillshub/portal-settings.js?v=2.5"></script>
  <script src="/assets/skillshub_core/js/skillshub/profile.js?v=2.5"></script>
</body>
</html>
