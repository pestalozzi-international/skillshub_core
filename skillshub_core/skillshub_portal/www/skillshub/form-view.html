<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SkillsHub - Form View</title>
  <link rel="icon" id="sh-favicon" href="/assets/skillshub_core/images/favicon.png">
  <link rel="stylesheet" href="/skillshub/theme.css?v=3.0">
  <style>
    .form-shell { max-width: 980px; margin: 1.5rem auto; padding: 0 1rem 2rem; }
    .kv-grid { display:grid; grid-template-columns: repeat(3, minmax(0,1fr)); gap:0.6rem; margin-bottom:1rem; }
    .kv-item { border:1px solid var(--color-slate-100); border-radius:0.75rem; padding:0.65rem; background:var(--surface-color); }
    .kv-item strong { display:block; font-size:0.72rem; text-transform:uppercase; color:var(--muted-text-color); margin-bottom:0.18rem; }
    @media (max-width:900px) { .kv-grid { grid-template-columns:1fr; } }
  </style>
  <script>
    window.frappe = {};
    frappe.csrf_token = "{{ frappe.session.csrf_token }}";
  </script>
</head>
<body>
  <main class="form-shell">
    <a id="portal-form-back" href="/skillshub/profile" class="sh-btn-secondary" style="text-decoration:none;display:inline-block;margin-bottom:1rem;">← Back</a>
    <div class="sh-card">
      <h1 id="portal-form-title" style="margin-top:0;">Form Record</h1>
      <div id="portal-form-context" class="kv-grid"></div>
      <div id="portal-form-message"></div>
      <div id="portal-form-body"></div>
      <button id="portal-form-submit" class="sh-btn-primary" style="display:none;margin-top:1rem;">Submit Form</button>
    </div>
  </main>
  <script>
    (function () {
      var params = new URLSearchParams(window.location.search);
      var doctype = params.get('doctype');
      if (!doctype) {
        document.getElementById('portal-form-body').innerHTML = '<div class="sh-alert-error">Missing doctype in URL.</div>';
        return;
      }
      document.body.setAttribute('data-doctype', doctype);
      document.body.setAttribute('data-title', doctype + ' · View');
      document.getElementById('portal-form-title').textContent = doctype + ' · View';
    }());
  </script>
  <script src="/assets/skillshub_core/js/skillshub/portal-settings.js?v=3.0"></script>
  <script src="/assets/skillshub_core/js/skillshub/form-engine.js?v=3.0"></script>
</body>
</html>
